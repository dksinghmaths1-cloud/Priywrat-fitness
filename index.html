<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priywrat's Dev-Fit Dashboard</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #16161e;
            --accent-color: #00f2fe;
            --text-color: #c5c5d2;
            --rest-color: #ffb142;
            --work-color: #2ed573;
        }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 650px;
            width: 100%;
        }
        h1 { color: #fff; text-align: center; font-size: 24px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: var(--accent-color); margin-top: 0; font-size: 14px; letter-spacing: 1px; }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 14px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border: 1px solid #222230;
        }
        h2 { color: #fff; font-size: 18px; margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
        
        /* Schedule Matrix UI */
        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .matrix-day {
            background: #1e1e2f;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            border: 1px solid #2a2a40;
        }
        .matrix-day.today { border: 2px solid var(--accent-color); background: #1a2a3a; }
        .day-label { font-weight: bold; margin-bottom: 4px; font-size: 11px; }
        .type-label { font-size: 12px; font-weight: bold; }
        .type-A { color: var(--work-color); }
        .type-B { color: #a55eea; }
        .type-Rest { color: var(--rest-color); }

        /* Exercise List & Form Inputs */
        .exercise-row {
            display: flex;
            flex-direction: column;
            background: #1e1e2f;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid var(--accent-color);
        }
        .exec-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .exec-info { font-weight: 600; color: #fff; }
        .exec-target { font-size: 12px; color: #888; }
        .input-group { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
        input[type="number"] {
            width: 65px;
            padding: 8px;
            background: #121214;
            border: 1px solid #3a3a50;
            color: #fff;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
        }
        .anim-btn {
            background: #2a2a40;
            color: var(--accent-color);
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
        }
        
        /* CSS Animations Canvas */
        .anim-viewport {
            height: 80px;
            background: #0b0b0d;
            margin-top: 10px;
            border-radius: 6px;
            display: none;
            position: relative;
            overflow: hidden;
            border: 1px dashed #333;
        }
        .floor { position: absolute; bottom: 15px; width: 100%; height: 2px; background: #555; }
        
        /* Push Up Animation */
        .pushup-body {
            position: absolute; width: 50px; height: 6px; background: var(--accent-color);
            bottom: 30px; left: calc(50% - 25px); border-radius: 3px;
            transform-origin: right center;
            animation: pushup-cycle 2s infinite ease-in-out;
        }
        @keyframes pushup-cycle {
            0%, 100% { bottom: 30px; transform: rotate(0deg); }
            50% { bottom: 17px; transform: rotate(-5deg); }
        }

        /* Squat Animation */
        .squat-torso {
            position: absolute; width: 6px; height: 24px; background: var(--accent-color);
            bottom: 32px; left: 50%; border-radius: 3px;
            animation: squat-key 2s infinite ease-in-out;
        }
        .squat-legs {
            position: absolute; width: 16px; height: 6px; background: #fff;
            bottom: 26px; left: calc(50% - 5px);
            animation: squat-legs-key 2s infinite ease-in-out;
        }
        @keyframes squat-key {
            0%, 100% { transform: translateY(0); height: 24px; }
            50% { transform: translateY(10px); height: 18px; }
        }
        @keyframes squat-legs-key {
            0%, 100% { transform: scaleX(1); }
            50% { transform: scaleX(1.4) translateY(4px); }
        }

        /* Sync Button Layout */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            transition: 0.2s;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5); }
        .meta-text { font-size: 12px; color: #6e6e80; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>🥷 Priywrat's Dev-Fit Blueprint</h1>
    <p class="subtitle">HEIGHT: 167CM | WEIGHT: 55KG | BASELINE: 14 PUSH-UPS</p>

    <!-- 30-Day Training Plan Matrix -->
    <div class="card">
        <h2>📅 30-Day Plan Sequence <span id="current-workout-badge" style="font-size:12px; padding:4px 8px; background:#222; border-radius:4px;"></span></h2>
        <div class="matrix-grid" id="matrixContainer"></div>
    </div>

    <!-- Active Routine Log -->
    <div class="card">
        <h2 id="routine-title">Loading Today's Protocol...</h2>
        <form id="logForm">
            <div id="exerciseFormSpace"></div>
            <button type="button" class="submit-btn" onclick="syncWorkoutToSheets()">Transmit Workout Data 🚀</button>
            <div class="meta-text">Target parameters automatically scale up dynamically based on your submitted performance data.</div>
        </form>
    </div>
</div>

<script>
    const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbxf4I66vmBuocHqrrwMyNMsEWV2DMuWO67DJ2HFk_lNBpu7Zfoatpgx_NTv8mDsqOT_8Q/exec";

    // Setup base routines calibrated to your 14-pushup capability
    const dataset = {
        A: [
            { name: "Regular Push-Ups", base: "3 Sets x 10-12 Reps", anim: "pushup" },
            { name: "Regular Bodyweight Squats", base: "3 Sets x 15-20 Reps", anim: "squat" },
            { name: "Wide Grip Push-Ups", base: "3 Sets x 8-10 Reps", anim: "pushup" },
            { name: "Lateral Side Lunges", base: "3 Sets x 6 Reps/Side", anim: "squat" }
        ],
        B: [
            { name: "Vertical Pike Push-Ups", base: "3 Sets x 8-10 Reps", anim: "pushup" },
            { name: "Elevated Bulgarian Split Squats", base: "3 Sets x 10 Reps/Leg", anim: "squat" },
            { name: "Close Diamond Push-Ups", base: "3 Sets x 6-8 Reps", anim: "pushup" },
            { name: "Static Forearm Plank", base: "2 Sets x 30-45 Secs", anim: "none" }
        ]
    };

    // Calculate a structured 4-day active matrix starting today (July 14, 2026)
    const startDate = new Date(2026, 6, 14); 
    const sequenceCycle = ["A", "B", "Rest", "A", "B", "Rest", "Rest"]; // 4 days active per week split layout
    
    let activeDayType = "Rest";

    function compileMatrixSchedule() {
        const container = document.getElementById("matrixContainer");
        const rightNow = new Date();
        
        for (let i = 0; i < 30; i++) {
            let iterationDate = new Date(startDate);
            iterationDate.setDate(startDate.getDate() + i);
            
            // Determine structural routine assignment based on rotation index
            let cycleIndex = i % sequenceCycle.length;
            let type = sequenceCycle[cycleIndex];
            
            let dateStr = iterationDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            let isToday = iterationDate.toDateString() === rightNow.toDateString();
            
            if (isToday) {
                activeDayType = type;
            }

            container.innerHTML += `
                <div class="matrix-day ${isToday ? 'today' : ''}">
                    <div class="day-label">${dateStr}</div>
                    <div class="type-label type-${type}">${type === 'Rest' ? '🛋️ Rest' : '⚡ Day ' + type}</div>
                </div>
            `;
        }
    }

    function buildActiveWorkoutInterface() {
        const title = document.getElementById("routine-title");
        const space = document.getElementById("exerciseFormSpace");
        const badge = document.getElementById("current-workout-badge");

        badge.innerText = `TODAY: ${activeDayType === 'Rest' ? 'REST DAY' : 'WORKOUT ' + activeDayType}`;

        if (activeDayType === "Rest") {
            title.innerText = "🛋️ System Recovery Protocol";
            space.innerHTML = `<p style="text-align:center; padding: 20px 0; color: var(--rest-color)">Muscle tissue synthesis happens during recovery periods. No resistance training required today. Take a walks, stretch, focus on study, and sleep well!</p>`;
            return;
        }

        title.innerText = `🥷 Active Protocol: Workout ${activeDayType}`;
        space.innerHTML = "";

        dataset[activeDayType].forEach((ex, idx) => {
            let animationElement = "";
            if(ex.anim === "pushup") {
                animationElement = `<div class="pushup-body"></div><div class="floor"></div>`;
            } else if(ex.anim === "squat") {
                animationElement = `<div class="squat-torso"></div><div class="squat-legs"></div><div class="floor"></div>`;
            }

            space.innerHTML += `
                <div class="exercise-row">
                    <div class="exec-header">
                        <div>
                            <div class="exec-info">${ex.name}</div>
                            <div class="exec-target">Baseline Target: ${ex.base}</div>
                        </div>
                        ${ex.anim !== 'none' ? `<button type="button" class="anim-btn" onclick="toggleAnimationVisual(${idx})">Form Preview ℹ️</button>` : ''}
                    </div>
                    <div class="anim-viewport" id="anim-${idx}">${animationElement}</div>
                    <div class="input-group">
                        <label style="font-size: 13px;">Log Actual Reps Achieved Across Your 3 Sets:</label>
                        <input type="number" id="s1-${idx}" placeholder="S1" required>
                        <input type="number" id="s2-${idx}" placeholder="S2" required>
                        <input type="number" id="s3-${idx}" placeholder="S3" required>
                    </div>
                </div>
            `;
        });
    }

    function toggleAnimationVisual(idx) {
        const view = document.getElementById(`anim-${idx}`);
        view.style.display = (view.style.display === "block") ? "none" : "block";
    }

    async function syncWorkoutToSheets() {
        if (activeDayType === "Rest") {
            alert("No training telemetry to transmit on scheduled rest cycles.");
            return;
        }

        const loggedExercises = [];
        let validationCheck = true;

        dataset[activeDayType].forEach((ex, idx) => {
            const s1 = document.getElementById(`s1-${idx}`).value;
            const s2 = document.getElementById(`s2-${idx}`).value;
            const s3 = document.getElementById(`s3-${idx}`).value;

            if(!s1 || !s2 || !s3) {
                validationCheck = false;
            }

            loggedExercises.push({
                name: ex.name,
                reps: `S1:${s1} S2:${s2} S3:${s3}`
            });
        });

        if(!validationCheck) {
            alert("Please complete the entry fields for all active workflow sets.");
            return;
        }

        const transmissionPayload = {
            date: new Date().toLocaleDateString('en-US', { year:'numeric', month:'2-digit', day:'2-digit' }),
            workoutType: `Workout ${activeDayType}`,
            exercises: loggedExercises
        };

        try {
            await fetch(GOOGLE_API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(transmissionPayload)
            });
            alert("Workout logs successfully dispatched to cloud database! Keep raising the rep ceiling next session.");
            document.getElementById('logForm').reset();
        } catch (err) {
            alert("Error dispatching system payload. Inspect network logs.");
            console.error(err);
        }
    }

    // Run Engine Initializations
    compileMatrixSchedule();
    buildActiveWorkoutInterface();
</script>
</body>
</html>
